services:
  db:
    image: postgres:16-alpine
    container_name: neuralshielddigital-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neuralshielddigital}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-neuralshielddigital}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuralshielddigital-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/neuralshielddigital}
      HOST: 0.0.0.0
      PORT: 8000
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_data:/var/www/static
      - media_data:/var/www/media
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    container_name: neuralshielddigital-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro

volumes:
  postgres_data:
  static_data:
  media_data:
