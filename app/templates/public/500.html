{% extends "public/base.html" %}

{% block content %}
<section class="mx-auto max-w-5xl px-5 py-24 text-center md:px-8 md:py-32">
    <div class="mx-auto max-w-3xl rounded-[2rem] border border-white/6 bg-slate-900/70 p-10">
        <p class="text-xs uppercase tracking-[0.3em] text-cyan-300">Server Error</p>
        <h1 class="mt-4 font-['Space_Grotesk'] text-5xl font-bold text-white">Something went wrong on our side.</h1>
        <p class="mt-6 text-lg leading-8 text-slate-300">Please try again in a few moments. If the issue continues, contact us and we'll help directly.</p>
        <div class="mt-8 flex flex-wrap justify-center gap-4">
            <a href="/contact" class="rounded-full bg-cyan-400 px-6 py-3 text-sm font-semibold text-slate-950">Contact Us</a>
            <a href="/" class="rounded-full border border-cyan-300/25 px-6 py-3 text-sm font-semibold text-cyan-100">Return Home</a>
        </div>
    </div>
</section>
{% endblock %}
