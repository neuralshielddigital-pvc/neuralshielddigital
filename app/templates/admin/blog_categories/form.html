{% extends "admin/base.html" %}
{% block content %}
<form method="post" class="max-w-3xl rounded-[1.75rem] border border-slate-200 bg-white p-6 shadow-sm">
    <div class="grid gap-5">
        <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">Name</label>
            <input class="w-full rounded-xl border border-slate-300 px-4 py-3" name="name" value="{{ form_data.name }}">
        </div>
        <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">Slug</label>
            <input class="w-full rounded-xl border border-slate-300 px-4 py-3" name="slug" value="{{ form_data.slug }}">
            {% if form_errors.slug %}<p class="mt-2 text-sm text-red-600">{{ form_errors.slug[0] }}</p>{% endif %}
        </div>
        <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">Description</label>
            <textarea class="min-h-36 w-full rounded-xl border border-slate-300 px-4 py-3" name="description">{{ form_data.description }}</textarea>
        </div>
    </div>
    <div class="mt-8 flex gap-3">
        <button class="rounded-xl bg-slate-950 px-5 py-3 text-sm font-semibold text-white" type="submit">Save Category</button>
        <a class="rounded-xl border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700" href="/admin/blog/categories">Cancel</a>
    </div>
</form>
{% endblock %}
